version: '3.8'

services:
  # ============================================
  # SQL Server Express
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qrcerts-sqlserver-local
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD}" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================
  # QRCerts API + Frontend
  # ============================================
  qrcerts-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrcerts-app-local
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=QRCerts;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - QrBaseUrl=${QR_BASE_URL}
      - SOFFICE_PATH=/usr/bin/soffice
    ports:
      - "${APP_PORT:-8088}:80"
    volumes:
      - uploads_data:/app/wwwroot/uploads
      - logs_data:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sqlserver_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
